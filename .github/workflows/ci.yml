name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx tsc --noEmit
      # Non-blocking: pre-existing lint debt in components/. Remove
      # continue-on-error once that's cleaned up.
      - run: npm run lint
        continue-on-error: true
      - run: npm test
